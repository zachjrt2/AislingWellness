<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meet the Team | Aisling Wellness Center</title>
  <meta name="description" content="Meet the licensed specialists at Aisling Wellness Center — massage therapists, medical aestheticians, laser technicians, and our medical director.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="images/home-logo.png">
</head>
<body>

<nav id="nav"></nav>
<div id="nav-overlay"></div>
<div id="nav-drawer"></div>

<!-- Header -->
<div class="team-header">
  <div class="team-header-mark"><img src="images/banner-logo-1.png"></div>
  <div class="reveal-fade" style="position:relative;z-index:1;text-align:center">
    <span class="section-label" style="text-align:center;margin-bottom:16px">The people behind the practice</span>
    <h1 style="font-family:var(--display);font-size:clamp(32px,5vw,52px);font-weight:300;color:#eae5d5;line-height:1.15;margin-bottom:16px">Meet the team</h1>
    <p style="font-size:14px;color:#7a9070;line-height:1.7;max-width:500px;margin:0 auto">Licensed specialists united by a genuine care for the people in their hands.</p>
  </div>
</div>

<!-- Search & Filter Controls -->
<div class="team-controls">
  <div class="team-search-wrap">
    <div id="team-search-icon-box" class="team-search-icon"></div>
    <input type="text" id="team-search" class="team-search-input" placeholder="Search by name, title, or specialty...">
  </div>
</div>
<div id="filter-status-container"></div>

<!-- Grid -->
<main>
<section class="section" style="padding-top:0">
  <div class="container reveal-up">
    <div class="team-grid" id="team-grid"></div>

    <!-- CTA -->
    <div class="team-cta">
      <div>
        <h3>Not sure who to book with?</h3>
        <p>Call us and we'll match you with the right provider for your goals.</p>
      </div>
      <div class="team-cta-btns">
        <a href="tel:+18067156646" class="btn-gold">Call (806) 715-6646</a>
        <a href="book.html" class="btn-ghost">Browse services</a>
      </div>
    </div>
  </div>
</section>
</main>

<footer id="footer"></footer>

<script src="js/data.js"></script>
<script src="js/shared.js"></script>
<script>
  initShared('team');
  document.getElementById('team-search-icon-box').innerHTML = icon('search', 18, '#7a9e68');

  let activeTag = null;
  let searchQuery = '';

  function renderTeam() {
    const grid = document.getElementById('team-grid');
    const status = document.getElementById('filter-status-container');
    const container = document.querySelector('.container');
    
    const filtered = PROVIDERS.filter(p => {
      const q = searchQuery.toLowerCase();
      const matchesSearch = !searchQuery || 
        p.name.toLowerCase().includes(q) ||
        p.title.toLowerCase().includes(q) ||
        p.specialties.some(s => s.toLowerCase().includes(q));
      
      const matchesTag = !activeTag || p.specialties.includes(activeTag);
      return matchesSearch && matchesTag;
    });

    if (activeTag || searchQuery) {
      status.innerHTML = `
        <div class="team-filter-status">
          Showing ${filtered.length} specialists ${activeTag ? `specializing in <strong>${activeTag}</strong>` : ''} 
          ${searchQuery ? `${activeTag ? 'and' : ''} matching "<strong>${searchQuery}</strong>"` : ''}
          <span onclick="clearFilters()" style="cursor:pointer; color:var(--forest-moss); text-decoration:underline; margin-left:8px">Clear all</span>
        </div>
      `;
    } else {
      status.innerHTML = '';
    }

    grid.innerHTML = filtered.length ? filtered.map(p => `
      <div class="team-card">
        <div class="team-card-photo" style="background:${p.avatarBg}">
          ${p.photo ? `<img src="${p.photo}" alt="${p.name}" class="team-photo-img" loading="lazy">` : `
            <div class="team-avatar" style="background:${p.avatarBg};border:2px solid ${p.avatarColor}55;color:${p.avatarColor}">
              ${p.avatarInitials}
            </div>
            <span class="team-photo-label">Photo coming soon</span>
          `}
        </div>
        <div class="team-card-body">
          <h2>${p.name}</h2>
          <div class="team-card-title">${p.title}</div>
          <div class="team-card-creds">${p.credentials}${p.years ? ` · ${p.years} years experience` : ''}</div>
          <p class="team-card-bio">${p.bio}</p>
          <div class="specialty-label">Specialties</div>
          <div class="specialty-tags">
            ${p.specialties.map(s => `
              <button class="specialty-tag${s === activeTag ? ' active' : ''}" onclick="toggleTag('${s}')">
                ${s}
              </button>
            `).join('')}
          </div>
          <div class="team-card-actions">
            <a href="request.html?provider=${p.id}" class="team-request-btn">
              Book with ${p.name.split(' ')[0]}
            </a>
            ${p.bookingUrl && p.bookingUrl !== 'https://aislingwellnesscenter.com/book' ? `
              <a href="${p.bookingUrl}" target="_blank" rel="noopener" class="team-website-btn">
                ${p.name.split(' ')[0]}'s Website
              </a>
            ` : ''}
          </div>
        </div>
      </div>
    `).join('') : `
      <div style="grid-column: 1/-1; text-align:center; padding:60px 0; color:#8a8270">
        <p>No specialists found matching your criteria.</p>
        <button onclick="clearFilters()" class="btn-ghost--bark" style="margin-top:16px">Clear all filters</button>
      </div>
    `;
  }

  window.toggleTag = (tag) => {
    activeTag = (activeTag === tag) ? null : tag;
    renderTeam();
  };

  window.clearFilters = () => {
    activeTag = null;
    searchQuery = '';
    document.getElementById('team-search').value = '';
    renderTeam();
  };

  document.getElementById('team-search').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderTeam();
  });

  renderTeam();
</script>
</body>
</html>
