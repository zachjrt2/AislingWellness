<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meet the Team | Aisling Wellness Center</title>
  <meta name="description" content="Meet the licensed specialists at Aisling Wellness Center — massage therapists, medical aestheticians, laser technicians, and our medical director.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="nav"></nav>
<div id="nav-overlay"></div>
<div id="nav-drawer"></div>

<!-- Header -->
<div class="team-header">
  <div class="team-header-mark"><img src="images/banner-logo-1.png"></div>
  <div style="position:relative;z-index:1;text-align:center">
    <div class="breadcrumb" style="justify-content:center;display:flex;gap:4px;margin-bottom:20px">
      <a href="index.html" style="color:#6b8560">Home</a>
      <span style="color:#3a5030;margin:0 4px">›</span>
      <span style="color:#9ab88a">Our team</span>
    </div>
    <span class="section-label" style="text-align:center;margin-bottom:16px">The people behind the practice</span>
    <h1 style="font-family:var(--display);font-size:clamp(32px,5vw,52px);font-weight:300;color:#eae5d5;line-height:1.15;margin-bottom:16px">Meet the team</h1>
    <p style="font-size:14px;color:#7a9070;line-height:1.7;max-width:500px;margin:0 auto">Licensed specialists united by a genuine care for the people in their hands.</p>
  </div>
</div>

<!-- Grid -->
<section class="section">
  <div class="container">
    <div class="team-grid" id="team-grid"></div>

    <!-- CTA -->
    <div class="team-cta">
      <div>
        <h3>Not sure who to book with?</h3>
        <p>Call us and we'll match you with the right provider for your goals.</p>
      </div>
      <div class="team-cta-btns">
        <a href="tel:+18067156646" class="btn-gold">Call (806) 715-6646</a>
        <a href="book.html" class="btn-ghost">Browse services</a>
      </div>
    </div>
  </div>
</section>

<footer id="footer"></footer>

<script src="js/data.js"></script>
<script src="js/shared.js"></script>
<script>
  initShared('team');

  document.getElementById('team-grid').innerHTML = PROVIDERS.map(p => `
    <div class="team-card">
      <div class="team-card-photo" style="background:${p.avatarBg}">
        <div class="team-avatar" style="background:${p.avatarBg};border:2px solid ${p.avatarColor}55;color:${p.avatarColor}">
          ${p.avatarInitials}
        </div>
        <span class="team-photo-label">Photo coming soon</span>
      </div>
      <div class="team-card-body">
        <h2>${p.name}</h2>
        <div class="team-card-title">${p.title}</div>
        <div class="team-card-creds">${p.credentials} · ${p.years} years experience</div>
        <p class="team-card-bio">${p.bio}</p>
        <div class="specialty-label">Specialties</div>
        <div class="specialty-tags">
          ${p.specialties.map(s => `<span class="specialty-tag">${s}</span>`).join('')}
        </div>
        <a href="${p.bookingUrl}" target="_blank" rel="noopener" class="team-book-btn">
          ${icon('calendar', 14, '#c8b97a')}
          Book with ${p.name.split(' ')[0]}
        </a>
      </div>
    </div>
  `).join('');
</script>
</body>
</html>
