<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Treatment | Aisling Wellness Center</title>
  <meta name="description" content="Browse all treatments at Aisling Wellness Center. Find the right service, read about your provider, and book directly.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="nav"></nav>
<div id="nav-overlay"></div>
<div id="nav-drawer"></div>

<!-- Page header -->
<div class="book-header">
  <div class="book-header-inner">
    <div class="breadcrumb">
      <a href="index.html">Home</a>
      <span class="sep">›</span>
      <span class="current">Book a treatment</span>
    </div>
    <h1 style="font-family:var(--display);font-size:clamp(26px,4vw,36px);font-weight:300;color:#eae5d5;margin-bottom:6px">Book a Treatment</h1>
    <p style="font-size:13px;color:#9ab88a;letter-spacing:.03em">Select a service to explore details and find your provider</p>
  </div>
</div>

<!-- Mobile pills -->
<div id="mobile-pills"></div>

<!-- Main layout -->
<div class="book-layout">
  <aside id="sidebar"></aside>
  <div id="detail"></div>
</div>

<footer id="footer"></footer>

<script src="js/data.js"></script>
<script src="js/shared.js"></script>
<script>
  initShared('book');

  // ── Determine initial service from URL params ────────────────────────────
  const params = new URLSearchParams(location.search);
  const catParam = params.get('category');
  const svcParam = params.get('service');

  function getInitialId() {
    if (svcParam && SERVICES.find(s => s.id === svcParam)) return svcParam;
    if (catParam) {
      const cat = CATEGORIES.find(c => c.id === catParam);
      if (cat && cat.subCategories && cat.subCategories.length) {
        return cat.subCategories[0].serviceIds[0];
      }
    }
    return SERVICES[0].id;
  }

  let activeId = getInitialId();

  // ── Build sidebar ────────────────────────────────────────────────────────
  function buildSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = `
      <div class="sidebar-search-wrap">
        <div class="sidebar-search-icon">${icon('search', 14, '#8a8270')}</div>
        <input type="text" id="service-search" class="sidebar-search" placeholder="Search services...">
      </div>
      <div class="sidebar-scroll-area" id="sidebar-nav">
        <!-- Content will be rendered here -->
      </div>
    `;

    renderSidebar();

    document.getElementById('service-search').addEventListener('input', (e) => {
      handleSearch(e.target.value);
    });
  }

  function renderSidebar() {
    const nav = document.getElementById('sidebar-nav');
    nav.innerHTML = `
      <span class="sidebar-label">Categories</span>
      <div id="accordion-root">
        ${CATEGORIES.map(cat => {
          const isCatExpanded = cat.subCategories.some(sub => sub.serviceIds.includes(activeId));
          return `
            <div class="sidebar-category${isCatExpanded ? ' expanded' : ''}">
              <button class="sidebar-category-header">
                <span class="label">${cat.label}</span>
                <span class="chevron">›</span>
              </button>
              <div class="sidebar-sub-list">
                ${cat.subCategories.map(sub => {
                  const isSubExpanded = sub.serviceIds.includes(activeId);
                  return `
                    <div class="sidebar-subcategory${isSubExpanded ? ' expanded' : ''}">
                      <button class="sidebar-subcategory-header">
                        <span class="label">${sub.label}</span>
                        <span class="chevron">›</span>
                      </button>
                      <div class="sidebar-svc-list">
                        ${sub.serviceIds.map(svcId => {
                          const svc = SERVICES.find(s => s.id === svcId);
                          if (!svc) return '';
                          return `
                            <button class="sidebar-item${svc.id === activeId ? ' active' : ''}" data-id="${svc.id}">
                              <span class="sidebar-dot"></span>${svc.name}
                            </button>
                          `;
                        }).join('')}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;

    // Attach listeners
    document.querySelectorAll('.sidebar-category-header').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const parent = btn.parentElement;
        const wasExpanded = parent.classList.contains('expanded');
        // Collapse others if desired, but here we just toggle
        parent.classList.toggle('expanded');
      });
    });

    document.querySelectorAll('.sidebar-subcategory-header').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        btn.parentElement.classList.toggle('expanded');
      });
    });

    document.querySelectorAll('.sidebar-item').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        selectService(btn.dataset.id);
      });
    });
  }

  function handleSearch(query) {
    const nav = document.getElementById('sidebar-nav');
    if (!query.trim()) {
      renderNav();
      return;
    }

    const matches = SERVICES.filter(s => 
      s.name.toLowerCase().includes(query.toLowerCase()) || 
      (s.tags && s.tags.some(t => t.toLowerCase().includes(query.toLowerCase())))
    );

    nav.innerHTML = `
      <span class="sidebar-label">Results for "${query}"</span>
      <div style="padding-bottom:12px">
        ${matches.length ? matches.map(svc => `
          <button class="sidebar-item${svc.id === activeId ? ' active' : ''}" data-id="${svc.id}" style="width: calc(100% - 24px); margin-left:12px; margin-bottom:4px">
            <span class="sidebar-dot"></span>${svc.name}
          </button>
        `).join('') : '<p style="font-size:12px;color:#8a8270;padding:12px">No services found...</p>'}
      </div>
    `;

    nav.querySelectorAll('.sidebar-item').forEach(btn => {
      btn.addEventListener('click', () => selectService(btn.dataset.id));
    });
  }

  // ── Build mobile pills ───────────────────────────────────────────────────
  function buildPills() {
    // Grouping pills by category for mobile might also be nice, 
    // but for now let's keep them as a searchable or scrollable list.
    document.getElementById('mobile-pills').innerHTML = SERVICES.map(s => `
      <button class="pill${s.id === activeId ? ' active' : ''}" data-id="${s.id}">${s.name}</button>
    `).join('');
    document.querySelectorAll('.pill').forEach(btn => {
      btn.addEventListener('click', () => selectService(btn.dataset.id));
    });
  }

  // ── Render detail panel ──────────────────────────────────────────────────
  function renderDetail(svc) {
    const svcProviders = PROVIDERS.filter(p => svc.providerIds.includes(p.id));

    document.getElementById('detail').innerHTML = `
      <div class="detail-hero">
        <div class="detail-top">
          <div class="detail-icon-wrap">${icon(svc.icon, 22, '#7a9e68')}</div>
          <div class="detail-body">
            <div style="font-size:10px; color:#6b8560; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:4px">
              ${CATEGORIES.find(c => c.subCategories.some(sub => sub.serviceIds.includes(svc.id)))?.label || ''}
            </div>
            <h2>${svc.name}</h2>
            <p class="desc">${svc.fullDescription}</p>
            <div class="detail-tags">${svc.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            <div class="detail-meta">
              <div class="detail-meta-item"><div class="label">Duration</div><div class="value">${svc.duration}</div></div>
              <div class="detail-meta-item"><div class="label">Starting at</div><div class="value">${svc.price}</div></div>
              <div class="detail-meta-item"><div class="label">Area</div><div class="value">${svc.area}</div></div>
            </div>
          </div>
        </div>
      </div>

      <span class="providers-label">Choose your provider</span>
      <div class="providers-grid">
        ${svcProviders.map(p => `
          <div class="provider-card" data-id="${p.id}">
            <div class="provider-top">
              <div class="provider-avatar" style="background:${p.avatarBg};color:${p.avatarColor}">${p.avatarInitials}</div>
              <div>
                <div class="provider-name">${p.name}</div>
                <div class="provider-creds">${p.credentials} · ${p.years} yrs</div>
              </div>
            </div>
            <p class="provider-bio-short">${p.bio.split('.')[0]}.</p>
            <a href="${p.bookingUrl}" target="_blank" rel="noopener" class="provider-book-btn">
              Book with ${p.name.split(' ')[0]} →
            </a>
          </div>
        `).join('')}
        <div class="match-card">
          <p>Not sure who to choose?</p>
          <a href="tel:+18067156646">Call us — we'll match you</a>
        </div>
      </div>

      <div class="detail-ornament">· · ✦ · ·</div>
    `;

    // Provider card selection highlight
    document.querySelectorAll('.provider-card').forEach(card => {
      card.addEventListener('click', function() {
        document.querySelectorAll('.provider-card').forEach(c => c.classList.remove('selected'));
        this.classList.add('selected');
      });
    });
  }

  // ── Select service ───────────────────────────────────────────────────────
  function selectService(id) {
    activeId = id;
    const svc = SERVICES.find(s => s.id === id);
    if (!svc) return;

    // Update URL without reload
    const url = new URL(location.href);
    url.searchParams.set('service', id);
    history.replaceState({}, '', url);

    // Update sidebar active state and ensure expanded path
    renderSidebar();
    
    document.querySelectorAll('.pill').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.id === id);
    });

    renderDetail(svc);
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  buildSidebar();
  buildPills();
  renderDetail(SERVICES.find(s => s.id === activeId));
</script>
</body>
</html>
